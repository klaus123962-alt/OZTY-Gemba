<script>
// =================== ВСТРОЕННЫЙ SERVICE WORKER ===================
(function registerServiceWorker() {
    if ('serviceWorker' in navigator) {
        const swCode = `
            const CACHE_NAME = 'checklist-cache-v1';
            const ASSETS_TO_CACHE = [
                '/',
                './',
                location.origin + location.pathname,
                'https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js',
                'https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js'
            ];

            self.addEventListener('install', (event) => {
                event.waitUntil(
                    caches.open(CACHE_NAME)
                        .then((cache) => cache.addAll(ASSETS_TO_CACHE))
                );
            });

            self.addEventListener('fetch', (event) => {
                event.respondWith(
                    caches.match(event.request)
                        .then((response) => {
                            if (response) {
                                return response;
                            }
                            return fetch(event.request).catch(() => {
                                if (event.request.url.includes('exceljs') || 
                                    event.request.url.includes('FileSaver')) {
                                    return new Response(
                                        'Библиотека недоступна в офлайн-режиме. Экспорт будет доступен после восстановления соединения.',
                                        { status: 503, statusText: 'Service Unavailable' }
                                    );
                                }
                            });
                        })
                );
            });

            self.addEventListener('activate', (event) => {
                event.waitUntil(
                    caches.keys().then((cacheNames) => {
                        return Promise.all(
                            cacheNames.map((cacheName) => {
                                if (cacheName !== CACHE_NAME) {
                                    return caches.delete(cacheName);
                                }
                            })
                        );
                    })
                );
            });
        `;

        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);

        navigator.serviceWorker.register(swUrl)
            .then(registration => {
                console.log('ServiceWorker зарегистрирован успешно');
            })
            .catch(error => {
                console.log('Ошибка регистрации ServiceWorker:', error);
            });

        URL.revokeObjectURL(swUrl);
    }
})();

// =================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ===================
let remarkCount = 0;
const recognitions = new Map();
const voiceStates = new Map();
const flashStates = new Map();
let cameraActive = false; // Флаг для отслеживания активности камеры

// Направления обхода
const DIRECTIONS = [
    'ОТ и ТБ',
    'Инфраструктура',

// Класс для работы с IndexedDB
class OfflineStorage {
    constructor() {
        this.dbName = 'ChecklistDB';
        this.dbVersion = 2;
        this.db = null;
    }

    async init() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(this.dbName, this.dbVersion);
            
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                this.db = request.result;
                resolve();
            };
            
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                
                if (!db.objectStoreNames.contains('protocols')) {
                    const store = db.createObjectStore('protocols', { keyPath: 'id', autoIncrement: true });
                    store.createIndex('date', 'date', { unique: false });
                    store.createIndex('savedAt', 'savedAt', { unique: false });
                }
                
                if (!db.objectStoreNames.contains('photos')) {
                    const photoStore = db.createObjectStore('photos', { keyPath: 'id' });
                    photoStore.createIndex('protocolId', 'protocolId', { unique: false });
                }
            };
        });
    }

    async saveProtocol(protocolData) {
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction(['protocols', 'photos'], 'readwrite');
            const protocolStore = tx.objectStore('protocols');
            const photoStore = tx.objectStore('photos');
            
            const protocol = {
                ...protocolData,
                savedAt: new Date().toISOString(),
                id: protocolData.id || `protocol_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`
            };
            
            const photoPromises = [];
            
            if (protocol.remarks) {
                protocol.remarks.forEach((remark, index) => {
                    if (remark.photoData || remark.photoBlob) {
                        const photoId = `photo_${Date.now()}_${index}_${Math.random().toString(36).substr(2, 9)}`;
                        
                        const photoRequest = photoStore.add({
                            id: photoId,
                            protocolId: protocol.id,
                            remarkIndex: index,
                            photoData: remark.photoData,
                            photoBlob: remark.photoBlob
                        });
                        
                        photoPromises.push(new Promise((resolvePhoto) => {
                            photoRequest.onsuccess = () => {
                                remark.photoId = photoId;
                                delete remark.photoData;
                                delete remark.photoBlob;
                                resolvePhoto();
                            };
                        }));
                    }
                });
            }
            
            Promise.all(photoPromises).then(() => {
                const request = protocolStore.add(protocol);
                
                request.onsuccess = () => {
                    resolve(protocol.id);
                };
                
                request.onerror = () => reject(request.error);
            });
            
            tx.onerror = (e) => reject(e.target.error);
        });
    }

    async loadLastProtocol() {
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction(['protocols', 'photos'], 'readonly');
            const protocolStore = tx.objectStore('protocols');
            const photoStore = tx.objectStore('photos');
            
            const index = protocolStore.index('savedAt');
            const protocols = [];
            
            const request = index.openCursor(null, 'prev');
            
            request.onsuccess = (event) => {
                const cursor = event.target.result;
                if (cursor) {
                    protocols.push(cursor.value);
                    if (protocols.length >= 1) {
                        return;
                    }
                    cursor.continue();
                }
            };
            
            tx.oncomplete = async () => {
                if (protocols.length === 0) {
                    resolve(null);
                    return;
                }
                
                const lastProtocol = protocols[0];
                
                if (lastProtocol.remarks) {
                    for (let i = 0; i < lastProtocol.remarks.length; i++) {
                        const remark = lastProtocol.remarks[i];
                        if (remark.photoId) {
                            const photoRequest = photoStore.get(remark.photoId);
                            
                            await new Promise((resolvePhoto) => {
                                photoRequest.onsuccess = () => {
                                    const photo = photoRequest.result;
                                    if (photo) {
                                        remark.photoData = photo.photoData;
                                        remark.photoBlob = photo.photoBlob;
                                    }
                                    resolvePhoto();
                                };
                            });
                        }
                    }
                }
                
                resolve(lastProtocol);
            };
            
            tx.onerror = (e) => reject(e.target.error);
        });
    }

    async getAllProtocols() {
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction('protocols', 'readonly');
            const store = tx.objectStore('protocols');
            const request = store.getAll();
            
            request.onsuccess = () => {
                resolve(request.result);
            };
            
            request.onerror = () => reject(request.error);
        });
    }

    async getProtocolWithPhotos(protocolId) {
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction(['protocols', 'photos'], 'readonly');
            const protocolStore = tx.objectStore('protocols');
            const photoStore = tx.objectStore('photos');
            
            const request = protocolStore.get(protocolId);
            
            request.onsuccess = async () => {
                const protocol = request.result;
                
                if (protocol && protocol.remarks) {
                    for (let i = 0; i < protocol.remarks.length; i++) {
                        const remark = protocol.remarks[i];
                        if (remark.photoId) {
                            const photoRequest = photoStore.get(remark.photoId);
                            
                            await new Promise((resolvePhoto) => {
                                photoRequest.onsuccess = () => {
                                    const photo = photoRequest.result;
                                    if (photo) {
                                        remark.photoData = photo.photoData;
                                        remark.photoBlob = photo.photoBlob;
                                    }
                                    resolvePhoto();
                                };
                            });
                        }
                    }
                }
                
                resolve(protocol);
            };
            
            request.onerror = () => reject(request.error);
        });
    }

    // Метод для очистки всей истории
    async clearAllProtocols() {
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction(['protocols', 'photos'], 'readwrite');
            const protocolStore = tx.objectStore('protocols');
            const photoStore = tx.objectStore('photos');
            
            const protocolRequest = protocolStore.clear();
            const photoRequest = photoStore.clear();
            
            Promise.all([
                new Promise((resolve) => { protocolRequest.onsuccess = resolve; }),
                new Promise((resolve) => { photoRequest.onsuccess = resolve; })
            ]).then(() => {
                resolve();
            }).catch((error) => {
                reject(error);
            });
        });
    }
}

// Класс для автосохранения
class AutoSaveManager {
    constructor(storage) {
        this.storage = storage;
        this.saveTimeout = null;
        this.pendingChanges = false;
        this.currentProtocolId = null;
        this.autoSaveInterval = null;
    }

    startAutoSave(interval = 30000) {
        this.autoSaveInterval = setInterval(() => {
            if (this.pendingChanges) {
                this.saveCurrentState();
            }
        }, interval);
    }

    stopAutoSave() {
        if (this.autoSaveInterval) {
            clearInterval(this.autoSaveInterval);
        }
    }

    async saveCurrentState() {
        const data = this.collectFormData();
        
        try {
            if (this.currentProtocolId) {
                data.id = this.currentProtocolId;
            }
            
            const protocolId = await this.storage.saveProtocol(data);
            this.currentProtocolId = protocolId;
            this.pendingChanges = false;
            
            this.updateSaveStatus('✅ Протокол успешно сохранен', 'success');
        } catch (error) {
            console.error('Ошибка автосохранения:', error);
            this.updateSaveStatus('❌ Ошибка сохранения протокола', 'error');
            
            this.saveToLocalStorage(data);
        }
    }

    saveToLocalStorage(data) {
        try {
            const backup = JSON.stringify({
                data: data,
                timestamp: new Date().toISOString()
            });
            
            let backups = [];
            const stored = localStorage.getItem('checklist_backups');
            if (stored) {
                backups = JSON.parse(stored);
            }
            
            backups.unshift({
                id: `backup_${Date.now()}`,
                data: data,
                timestamp: new Date().toISOString()
            });
            
            if (backups.length > 5) {
                backups = backups.slice(0, 5);
            }
            
            localStorage.setItem('checklist_backups', JSON.stringify(backups));
            this.updateSaveStatus('⚠️ Сохранено в localStorage (резервная копия)', 'warning');
        } catch (e) {
            console.error('Не удалось сохранить даже в localStorage:', e);
            this.updateSaveStatus('❌ Ошибка: нет места для сохранения', 'error');
        }
    }

    collectFormData() {
        const data = {
            date: document.getElementById('date').value,
            group: document.getElementById('group').value,
            route: document.getElementById('route').value,
            remarks: []
        };
        
        document.querySelectorAll('.remark').forEach((remark, index) => {
            const remarkId = remark.id;
            const remarkNumber = index + 1;
            
            const description = document.getElementById(`description-${remarkId}`)?.value || '';
            
            const responsibleSelect = document.getElementById(`responsible-${remarkNumber}`);
            const customResponsibleInput = document.getElementById(`custom-responsible-${remarkId}`);
            let responsible = '';
            if (responsibleSelect && responsibleSelect.value === "custom") {
                responsible = customResponsibleInput?.value || '';
            } else if (responsibleSelect) {
                responsible = responsibleSelect.value || '';
            }
            
            const locationSelect = document.getElementById(`location-${remarkId}`);
            const customLocationInput = document.getElementById(`custom-location-${remarkId}`);
            let location = '';
            if (locationSelect && locationSelect.value === "custom") {
                location = customLocationInput?.value || '';
            } else if (locationSelect) {
                location = locationSelect.value || '';
            }
            
            const directionSelect = document.getElementById(`direction-${remarkId}`);
            const direction = directionSelect?.value || '';
            
            const remarkData = {
                index: index,
                description: description,
                responsible: responsible,
                location: location,
                direction: direction,
                photoData: remark.getAttribute('data-photo-base64'),
                photoBlob: remark.getAttribute('data-photo-blob')
            };
            
            data.remarks.push(remarkData);
        });
        
        return data;
    }

    updateSaveStatus(text, type) {
        let statusDiv = document.getElementById('save-status');
        if (!statusDiv) {
            statusDiv = document.createElement('div');
            statusDiv.id = 'save-status';
            document.body.appendChild(statusDiv);
        }
        
        statusDiv.textContent = text;
        statusDiv.className = `save-status ${type}`;
        statusDiv.style.opacity = '1';
        
        setTimeout(() => {
            statusDiv.style.opacity = '0';
        }, 5000);
    }
}

    collapseAll();
    remark.classList.remove("collapsed");

function closeRemark(button){
    const remark = button.closest(".remark");
    const video = remark.querySelector('video');
    
    if (video && video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
    }
    
    const remarkId = remark.id;
    if (recognitions.has(remarkId)) {
        const rec = recognitions.get(remarkId);
        if (rec) {
            rec.stop();
        }
        recognitions.delete(remarkId);
    }
    
    voiceStates.delete(remarkId);
    flashStates.delete(remarkId);
    
    remark.remove();
    
    if (autoSaveManager) {
        autoSaveManager.pendingChanges = true;
    }
}

function updateLocationSelect(remarkId) {
    const locationSelect = document.getElementById(`location-${remarkId}`);
    const customLocationInput = document.getElementById(`custom-location-${remarkId}`);
    
    if (!locationSelect) return;
    
    const currentValue = locationSelect.value;
    
    locationSelect.innerHTML = '';
    
    // Фиксированный список мест обнаружения
    const options = ['Территория возле КПП', 'Склад ТМЦ'];
    
    options.forEach(option => {
        const opt = document.createElement('option');
        opt.value = option;
        opt.textContent = option;
        locationSelect.appendChild(opt);
    });
    
    // Добавляем опцию "Другие"

    customOpt.value = 'custom';
    customOpt.textContent = 'Другие';
    locationSelect.appendChild(customOpt);
    
    // Восстанавливаем предыдущее значение если оно есть в списке

        locationSelect.value = currentValue;

function toggleFlash(remarkNumber) {
    const remarkId = `remark-${remarkNumber}`;
    const flashButton = document.getElementById(`flash-btn-${remarkNumber}`);
    
    const currentState = flashStates.get(remarkId) || false;
    const newState = !currentState;
    
    flashStates.set(remarkId, newState);
    
    if (newState) {
        flashButton.textContent = '🌙 Выключить подсветку';
        flashButton.classList.remove('off');
        flashButton.classList.add('on');
    } else {
        flashButton.textContent = '🔆 Включить подсветку';
        flashButton.classList.remove('on');
        flashButton.classList.add('off');
    }
    
    applyFlashSettings(remarkNumber);
}

function applyFlashSettings(remarkNumber) {
    const videoId = `video-${remarkNumber}`;
    const video = document.getElementById(videoId);
    
    if (!video || !video.srcObject) return;
    
    const remarkId = `remark-${remarkNumber}`;
    const useFlash = flashStates.get(remarkId) || false;
    
    const stream = video.srcObject;
    const track = stream.getVideoTracks()[0];
    
    if (track && track.getCapabilities) {
        const capabilities = track.getCapabilities();
        
        if (capabilities.torch) {
            track.applyConstraints({
                advanced: [{torch: useFlash}]
            }).catch(err => {
                console.error('Ошибка при изменении настроек подсветки:', err);
            });
        }
    }
}

function deletePhoto(remarkNumber) {

    photoBtn.disabled = false;
    
    if (autoSaveManager) {
        autoSaveManager.pendingChanges = true;
    }
}

function initCamera(remarkNumber) {
    const videoId = `video-${remarkNumber}`;
    const video = document.getElementById(videoId);
    
    if (!video) return;
    
    if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
    }
    
    const constraints = {
        video: { 
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 }
        }
    };
    
    navigator.mediaDevices.getUserMedia(constraints)
    .then(stream => {
        video.srcObject = stream;
        video.play().catch(e => console.error("Ошибка воспроизведения видео:", e));
        
        setTimeout(() => applyFlashSettings(remarkNumber), 500);
    })
    .catch(err => {
        console.error("Ошибка доступа к камере:", err);
        video.style.display = "none";
        const btn = document.getElementById(`photo-btn-${remarkNumber}`);
        if (btn) {
            btn.disabled = true;
            btn.textContent = "📷 Камера недоступна";
        }
        
        const flashBtn = document.getElementById(`flash-btn-${remarkNumber}`);
        if (flashBtn) flashBtn.disabled = true;
    });
}

function takePhoto(remarkNumber) {
    const videoId = `video-${remarkNumber}`;
    const video = document.getElementById(videoId);
    const remarkId = `remark-${remarkNumber}`;
    const preview = document.getElementById(`photo-preview-${remarkId}`);
    const remark = document.getElementById(remarkId);
    const photoActions = document.getElementById(`photo-actions-${remarkId}`);
    
    if (!video || !video.videoWidth || video.videoWidth === 0) {
        alert("Камера не готова. Подождите, пока камера загрузится.");
        return;
    }
    
    const useFlash = flashStates.get(remarkId) || false;
    let flashPromise = Promise.resolve();
    
    if (useFlash) {
        const stream = video.srcObject;
        const track = stream.getVideoTracks()[0];
        
        if (track && track.getCapabilities && track.getCapabilities().torch) {
            flashPromise = track.applyConstraints({
                advanced: [{torch: true}]
            });
        }
    }
    
    flashPromise.then(() => {
        return new Promise(resolve => setTimeout(resolve, 300));
    }).then(() => {
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        
        const videoWidth = video.videoWidth;
        const videoHeight = video.videoHeight;
        
        const isPortrait = videoHeight > videoWidth;
        
        canvas.width = videoWidth;
        canvas.height = videoHeight;
        
        context.drawImage(video, 0, 0, videoWidth, videoHeight);
        
        remark.setAttribute('data-photo-orientation', isPortrait ? 'portrait' : 'landscape');
        remark.setAttribute('data-photo-width', videoWidth);
        remark.setAttribute('data-photo-height', videoHeight);
        
        const photoDataUrl = canvas.toDataURL('image/jpeg', 0.9);
        
        const img = document.createElement('img');
        img.src = photoDataUrl;
        img.alt = `Фото замечания ${remarkNumber}`;
        
        if (isPortrait) {
            img.style.maxWidth = '200px';
            img.style.maxHeight = '300px';
        } else {
            img.style.maxWidth = '300px';
            img.style.maxHeight = '200px';
        }
        img.style.objectFit = 'contain';
        
        img.onclick = function() { zoomPhoto(this); };
        
        preview.innerHTML = '';
        preview.appendChild(img);
        
        photoActions.style.display = 'flex';
        
        remark.setAttribute('data-photo-base64', photoDataUrl);
        
        canvas.toBlob(function(blob) {
            const reader = new FileReader();
            reader.onloadend = function() {
                remark.setAttribute('data-photo-blob', reader.result);
                
                if (autoSaveManager) {
                    autoSaveManager.pendingChanges = true;
                }
            };
            reader.readAsDataURL(blob);
        }, 'image/jpeg', 0.9);
        
        const btn = document.getElementById(`photo-btn-${remarkNumber}`);
        btn.textContent = '📷 Фото сделано';
        btn.disabled = true;
        
        if (useFlash) {
            const stream = video.srcObject;
            const track = stream.getVideoTracks()[0];
            
            if (track && track.getCapabilities && track.getCapabilities().torch) {
                setTimeout(() => {
                    track.applyConstraints({
                        advanced: [{torch: useFlash}]
                    });
                }, 500);
            }
        }
    }).catch(error => {
        console.error("Ошибка при съемке фото:", error);
        alert("Ошибка при съемке фото. Попробуйте еще раз.");
    });
}

// РАСПОЗНАВАНИЕ РЕЧИ - микрофон включается ТОЛЬКО при нажатии кнопки
function startVoiceInput(remarkId) {
    const statusDiv = document.getElementById(`status-${remarkId}`);
    const startBtn = document.getElementById(`start-btn-${remarkId}`);
    const stopBtn = document.getElementById(`stop-btn-${remarkId}`);
    const clearBtn = document.getElementById(`clear-btn-${remarkId}`);
    const textarea = document.getElementById(`description-${remarkId}`);
    const replaceControls = document.getElementById(`replace-controls-${remarkId}`);
    
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("Ваш браузер не поддерживает распознавание речи. Пожалуйста, используйте Chrome или Edge.");
        return;
    }
    
    if (recognitions.has(remarkId)) {
        const oldRec = recognitions.get(remarkId);
        if (oldRec) {
            oldRec.stop();
        }
        recognitions.delete(remarkId);
    }
    
    if (!voiceStates.has(remarkId)) {
        voiceStates.set(remarkId, {
            currentText: textarea.value || '',
            tempText: '',
            isRecording: false,
            shouldReplace: false,
            lastFinalText: '',
            lastProcessedText: '',
            duplicatePrevention: []
        });
    }
    
    const state = voiceStates.get(remarkId);
    state.tempText = '';
    state.isRecording = true;
    state.shouldReplace = false;
    state.lastFinalText = '';
    state.lastProcessedText = '';
    state.duplicatePrevention = [];
    
    const recognition = new SpeechRecognition();
    recognition.lang = 'ru-RU';
    recognition.interimResults = true;
    recognition.continuous = false;
    recognition.maxAlternatives = 1;
    
    function isDuplicateText(newText, existingText) {
        if (!newText || !existingText) return false;
        
        const newWords = newText.toLowerCase().split(/\s+/).filter(w => w.length > 3);
        const existingWords = existingText.toLowerCase().split(/\s+/).filter(w => w.length > 3);
        
        if (newWords.length < 2 || existingWords.length < 2) return false;
        
        let duplicateCount = 0;
        for (const word of newWords) {
            if (existingWords.includes(word)) {
                duplicateCount++;
            }
        }
        
        return duplicateCount / newWords.length > 0.7;
    }
    
    recognition.onstart = function() {
        statusDiv.style.display = 'block';
        statusDiv.textContent = '🎤 Слушаю... Говорите четко и медленно';
        statusDiv.style.background = "#fff3e0";
        statusDiv.style.color = "#ef6c00";
        statusDiv.classList.add('recording');
        startBtn.disabled = true;
        stopBtn.disabled = false;
        clearBtn.disabled = true;
        replaceControls.style.display = 'none';
        
        if (textarea.value.trim()) {
            textarea.classList.add('text-replace-mode');
        }
    };
    
    recognition.onresult = function(event) {
        const state = voiceStates.get(remarkId);
        if (!state) return;
        
        let finalTranscript = '';
        let interimTranscript = '';
        
        for (let i = 0; i < event.results.length; i++) {
            const result = event.results[i];
            const transcript = result[0].transcript.trim();
            
            if (result.isFinal) {
                finalTranscript += (finalTranscript ? ' ' : '') + transcript;
            } else {
                interimTranscript += (interimTranscript ? ' ' : '') + transcript;
            }
        }
        
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        if (isMobile) {
            if (finalTranscript) {
                const processedText = finalTranscript.trim();
                
                if (processedText && processedText !== state.lastProcessedText) {
                    let isDuplicate = false;
                    for (const prevText of state.duplicatePrevention) {
                        if (isDuplicateText(processedText, prevText)) {
                            isDuplicate = true;
                            break;
                        }
                    }
                    
                    if (!isDuplicate) {
                        state.tempText = processedText;
                        state.lastProcessedText = processedText;
                        
                        state.duplicatePrevention.push(processedText);
                        if (state.duplicatePrevention.length > 5) {
                            state.duplicatePrevention.shift();
                        }
                        
                        textarea.value = processedText;
                    }
                }
            }
        } else {
            state.tempText = finalTranscript || interimTranscript;
            if (state.tempText) {
                textarea.value = state.tempText;
            }
        }
    };
    
    recognition.onerror = function(event) {
        console.error("Ошибка распознавания:", event.error);
        const state = voiceStates.get(remarkId);
        
        if (event.error === 'no-speech') {
            statusDiv.textContent = "Речь не обнаружена. Попробуйте снова";
        } else if (event.error === 'audio-capture') {
            statusDiv.textContent = "Микрофон недоступен";
        } else if (event.error === 'not-allowed') {
            statusDiv.textContent = "Доступ к микрофону запрещен";
        } else {
            statusDiv.textContent = "Ошибка: " + event.error;
        }
        
        statusDiv.style.background = "#ffebee";
        statusDiv.style.color = "#d32f2f";
        statusDiv.classList.remove('recording');
        
        startBtn.disabled = false;
        stopBtn.disabled = true;
        clearBtn.disabled = false;
        
        if (state) {
            state.isRecording = false;
        }
        
        recognitions.delete(remarkId);
        textarea.classList.remove('text-replace-mode');
    };
    
    recognition.onend = function() {
        const state = voiceStates.get(remarkId);
        if (!state) return;
        
        if (state.isRecording) {
            setTimeout(() => {
                if (state.isRecording && !recognitions.has(remarkId)) {
                    try {
                        recognition.start();
                        return;
                    } catch (e) {
                        console.log("Не удалось перезапустить запись");
                    }
                }
            }, 300);
            return;
        }
        
        state.isRecording = false;
        
        if (state.tempText && state.tempText.trim()) {
            statusDiv.textContent = "Распознано. Выберите действие:";
            statusDiv.style.background = "#e8f5e9";
            statusDiv.style.color = "#2e7d32";
            
            replaceControls.style.display = 'flex';
            
            state.currentText = textarea.value;
        } else {
            statusDiv.style.display = 'none';
            startBtn.disabled = false;
            stopBtn.disabled = true;
            clearBtn.disabled = false;
        }
        
        statusDiv.classList.remove('recording');
        textarea.classList.remove('text-replace-mode');
        
        recognitions.delete(remarkId);
    };
    
    recognitions.set(remarkId, recognition);
    
    try {
        recognition.start();
    } catch (error) {
        console.error("Ошибка запуска:", error);
        statusDiv.textContent = "Не удалось начать распознавание";
        statusDiv.style.display = 'block';
        statusDiv.style.background = "#ffebee";
        statusDiv.style.color = "#d32f2f";
        
        if (state) {
            state.isRecording = false;
        }
    }
}

// =================== ФУНКЦИИ ХЕШИРОВАНИЯ ===================
/*
💾 Сохранить в URL - сохраняет данные в адресную строку (хэш)
Это позволяет поделиться ссылкой или восстановить данные при перезагрузке
НО имеет ограничение по длине (примерно 2000 символов)
Подходит только для небольших протоколов без фото
*/

function saveToHash() {
    try {
        const data = {
            date: document.getElementById('date').value,
            group: document.getElementById('group').value,
            route: document.getElementById('route').value,
            remarks: []
        };
        
        const remarks = document.querySelectorAll('.remark');
        remarks.forEach((remark, index) => {
            const remarkId = remark.id;
            const remarkNumber = index + 1;
            
            const description = document.getElementById(`description-${remarkId}`)?.value || '';
            
            const responsibleSelect = document.getElementById(`responsible-${remarkNumber}`);
            const customResponsibleInput = document.getElementById(`custom-responsible-${remarkId}`);
            let responsible = '';
            if (responsibleSelect && responsibleSelect.value === "custom") {
                responsible = customResponsibleInput?.value || '';
            } else if (responsibleSelect) {
                responsible = responsibleSelect.value || '';
            }
            
            const locationSelect = document.getElementById(`location-${remarkId}`);
            const customLocationInput = document.getElementById(`custom-location-${remarkId}`);
            let location = '';
            if (locationSelect && locationSelect.value === "custom") {
                location = customLocationInput?.value || '';
            } else if (locationSelect) {
                location = locationSelect.value || '';
            }
            
            const directionSelect = document.getElementById(`direction-${remarkId}`);
            const direction = directionSelect?.value || '';
            
            const hasPhoto = remark.hasAttribute('data-photo-base64');
            let photoData = null;
            if (hasPhoto) {
                const fullBase64 = remark.getAttribute('data-photo-base64');
                photoData = fullBase64 ? fullBase64.split(',')[1] : null;
            }
            
            data.remarks.push({
                description,
                responsible,
                location,
                direction,
                hasPhoto: !!photoData,
                photoData: photoData ? photoData.substring(0, 100) : null // Обрезаем фото для URL
            });
        });
        
        const jsonData = JSON.stringify(data);
        const encodedData = btoa(encodeURIComponent(jsonData));
        
        window.location.hash = `#data=${encodedData}`;
        
        if (autoSaveManager) {
            autoSaveManager.updateSaveStatus('🔗 Данные сохранены в URL', 'info');
        }
        
        console.log('Данные сохранены в hash');
    } catch (error) {
        console.error('Ошибка при сохранении в hash:', error);
        if (autoSaveManager) {
            autoSaveManager.updateSaveStatus('❌ Ошибка сохранения в URL (слишком много данных)', 'error');
        }
    }
}

function loadFromHash() {
    try {
        const hash = window.location.hash;
        if (!hash || !hash.includes('data=')) return;
        
        const encodedData = hash.split('data=')[1];
        if (!encodedData) return;
        
        const jsonData = decodeURIComponent(atob(encodedData));
        const data = JSON.parse(jsonData);
        
        if (data.date) document.getElementById('date').value = data.date;
        if (data.group) document.getElementById('group').value = data.group;
        if (data.route) document.getElementById('route').value = data.route;
        
        document.getElementById('remarks').innerHTML = '';
        remarkCount = 0;
        
        if (data.remarks && data.remarks.length > 0) {
            data.remarks.forEach((remarkData, index) => {
                addRemark();
                
                const remarkId = `remark-${index + 1}`;
                const remarkElement = document.getElementById(remarkId);
                
                if (remarkElement) {
                    const descriptionField = document.getElementById(`description-${remarkId}`);
                    if (descriptionField && remarkData.description) {
                        descriptionField.value = remarkData.description;
                    }
                    
                    const responsibleSelect = document.getElementById(`responsible-${index + 1}`);
                    const customResponsibleInput = document.getElementById(`custom-responsible-${remarkId}`);
                    if (responsibleSelect && remarkData.responsible) {
                        const isStandard = Array.from(responsibleSelect.options).some(
                            opt => opt.value === remarkData.responsible
                        );
                        
                        if (isStandard) {
                            responsibleSelect.value = remarkData.responsible;
                        } else {
                            responsibleSelect.value = 'custom';
                            customResponsibleInput.style.display = 'block';
                            customResponsibleInput.value = remarkData.responsible;
                        }
                    }
                    
                    const locationSelect = document.getElementById(`location-${remarkId}`);
                    const customLocationInput = document.getElementById(`custom-location-${remarkId}`);
                    if (locationSelect && remarkData.location) {
                        setTimeout(() => {
                            const isStandard = Array.from(locationSelect.options).some(
                                opt => opt.value === remarkData.location
                            );
                            
                            if (isStandard) {
                                locationSelect.value = remarkData.location;
                            } else {
                                locationSelect.value = 'custom';
                                customLocationInput.style.display = 'block';
                                customLocationInput.value = remarkData.location;
                            }
                        }, 100);
                    }
                    
                    const directionSelect = document.getElementById(`direction-${remarkId}`);
                    if (directionSelect && remarkData.direction) {
                        directionSelect.value = remarkData.direction;
                    }
                }
            });
        }
        
        console.log('Данные загружены из hash');
    } catch (error) {
        console.error('Ошибка при загрузке из hash:', error);
    }
}

function clearHash() {
    if (confirm('Вы уверены, что хотите очистить все данные в URL? Это действие нельзя отменить.')) {
        window.location.hash = '';
        location.reload();
    }
}

function loadProtocolData(protocol) {
    document.getElementById('date').value = protocol.date || '';
    document.getElementById('group').value = protocol.group || '';
    document.getElementById('route').value = protocol.route || '';
    
    if (protocol.remarks && protocol.remarks.length > 0) {
        document.getElementById('remarks').innerHTML = '';
        remarkCount = 0;
        
        protocol.remarks.forEach((remarkData, index) => {
            addRemark();
            
            const remarkId = `remark-${index + 1}`;
            setTimeout(() => {
                const descField = document.getElementById(`description-${remarkId}`);
                if (descField && remarkData.description) {
                    descField.value = remarkData.description;
                }
                
                const responsibleSelect = document.getElementById(`responsible-${index + 1}`);
                const customResponsibleInput = document.getElementById(`custom-responsible-${remarkId}`);
                if (responsibleSelect && remarkData.responsible) {
                    const isStandard = Array.from(responsibleSelect.options).some(
                        opt => opt.value === remarkData.responsible
                    );
                    
                    if (isStandard) {
                        responsibleSelect.value = remarkData.responsible;
                    } else {
                        responsibleSelect.value = 'custom';
                        customResponsibleInput.style.display = 'block';
                        customResponsibleInput.value = remarkData.responsible;
                    }
                }
                
                const locationSelect = document.getElementById(`location-${remarkId}`);
                const customLocationInput = document.getElementById(`custom-location-${remarkId}`);
                if (locationSelect && remarkData.location) {
                    setTimeout(() => {
                        const isStandard = Array.from(locationSelect.options).some(
                            opt => opt.value === remarkData.location
                        );
                        
                        if (isStandard) {
                            locationSelect.value = remarkData.location;
                        } else {
                            locationSelect.value = 'custom';
                            customLocationInput.style.display = 'block';
                            customLocationInput.value = remarkData.location;
                        }
                    }, 100);
                }
                
                const directionSelect = document.getElementById(`direction-${remarkId}`);
                if (directionSelect && remarkData.direction) {
                    directionSelect.value = remarkData.direction;
                }
                
                if (remarkData.photoData) {
                    restorePhoto(remarkId, remarkData);
                }
            }, 100);
        });
    }
    
    if (autoSaveManager) {
        autoSaveManager.currentProtocolId = protocol.id;
        autoSaveManager.pendingChanges = false;
    }
}

function restorePhoto(remarkId, remarkData) {
    const remark = document.getElementById(remarkId);
    const preview = document.getElementById(`photo-preview-${remarkId}`);
    const photoActions = document.getElementById(`photo-actions-${remarkId}`);
    const remarkNumber = remarkId.split('-')[1];
    const photoBtn = document.getElementById(`photo-btn-${remarkNumber}`);
    
    if (remarkData.photoData) {
        remark.setAttribute('data-photo-base64', remarkData.photoData);
    }
    if (remarkData.photoBlob) {
        remark.setAttribute('data-photo-blob', remarkData.photoBlob);
    }
    
    const img = document.createElement('img');
    img.src = remarkData.photoData || remarkData.photoBlob;
    img.alt = 'Фото';
    img.style.maxWidth = '250px';
    img.style.maxHeight = '200px';
    img.style.objectFit = 'contain';
    img.onclick = function() { zoomPhoto(this); };
    
    preview.innerHTML = '';
    preview.appendChild(img);
    photoActions.style.display = 'flex';
    
    if (photoBtn) {
        photoBtn.textContent = '📷 Фото сделано';
        photoBtn.disabled = true;
    }
}

                .map(p => `
                    <div class="backup-item" onclick="loadBackup('${p.id}')">

                        <div class="stats">

                try {
                    const base64Data = photoBlob.split(',')[1];
                    const imageBuffer = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
                    
                    const originalWidth = parseInt(remark.getAttribute('data-photo-width')) || 0;
                    const originalHeight = parseInt(remark.getAttribute('data-photo-height')) || 0;
                    
                    const imageId = workbook.addImage({
                        buffer: imageBuffer,
                        extension: 'jpeg'
                    });
                    
                    const maxCellWidth = 300;
                    const maxCellHeight = 400;
                    
                    let targetWidth = originalWidth;
                    let targetHeight = originalHeight;
                    
                    if (originalWidth > 0 && originalHeight > 0) {
                        const widthRatio = maxCellWidth / originalWidth;
                        const heightRatio = maxCellHeight / originalHeight;
                        const scaleRatio = Math.min(widthRatio, heightRatio);
                        
                        targetWidth = Math.round(originalWidth * scaleRatio);
                        targetHeight = Math.round(originalHeight * scaleRatio);
                    } else {
                        targetWidth = 300;
                        targetHeight = 200;
                    }
                    
                    const excelRowHeight = Math.max(120, Math.round(targetHeight * 0.75) + 20);
                    row.height = excelRowHeight;
                    
                    const cellWidthPixels = 45 * 7;
                    const cellHeightPixels = excelRowHeight * 0.75;
                    const offsetX = Math.max(0, Math.round((cellWidthPixels - targetWidth) / 2));
                    const offsetY = Math.max(0, Math.round((cellHeightPixels - targetHeight) / 2));
                    
                    worksheet.addImage(imageId, {
                        tl: { col: 1, row: currentRow - 1, offsetX: offsetX, offsetY: offsetY },
                        ext: { width: targetWidth, height: targetHeight }
                    });
                    
                    row.getCell(2).value = "";
                    
                } catch (error) {
                    console.error("Ошибка при добавлении фото:", error);
                    row.getCell(2).value = "Ошибка фото";
                    row.getCell(2).alignment = { 
                        vertical: 'middle', 
                        horizontal: 'center' 
                    };
                }
            } else {
                row.getCell(2).value = "Нет фото";
                row.getCell(2).alignment = { 
                    vertical: 'middle', 
                    horizontal: 'center' 
                };
            }
            
            currentRow++;
        }
        
        for (let i = 8; i < currentRow; i++) {
            const row = worksheet.getRow(i);
            for (let j = 1; j <= 8; j++) {
                const cell = row.getCell(j);
                cell.border = {
                    top: { style: 'thin', color: { argb: 'FF001355' } },
                    left: { style: 'thin', color: { argb: 'FF001355' } },
                    bottom: { style: 'thin', color: { argb: 'FF001355' } },
                    right: { style: 'thin', color: { argb: 'FF001355' } }
                };
            }
        }
        
        worksheet.views = [
            { state: 'normal', showGridLines: true }
        ];
        
        const fileName = `Протокол_обхода_${date}_${group.replace(/\s+/g, '_')}.xlsx`;
        
        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        
        saveAs(blob, fileName);
        
        document.getElementById('loading').style.display = 'none';
        
        if (autoSaveManager) {
            autoSaveManager.updateSaveStatus(`✅ Протокол "${fileName}" успешно сохранен`, 'success');
        }
        
        alert(`Протокол "${fileName}" успешно сохранен.\nВсего замечаний: ${remarks.length}\n\nЯчейки "Статус" имеют цветовое кодирование:\n• Выполнено - зелёный\n• В работе - жёлтый\n• Отклонено - серый\n• Не рассмотрено - без цвета`);
        
    } catch (error) {
        console.error("Ошибка при создании Excel:", error);
        document.getElementById('loading').style.display = 'none';
        
        if (autoSaveManager) {
            if (!navigator.onLine) {
                autoSaveManager.updateSaveStatus('❌ Вы в офлайн-режиме. Экспорт недоступен', 'error');
            } else {
                autoSaveManager.updateSaveStatus('❌ Ошибка при создании файла', 'error');
            }
        }
        
        if (!navigator.onLine) {
            alert("Вы находитесь в офлайн-режиме. Экспорт в Excel недоступен. Данные сохранены локально.");
        } else {
            alert("Произошла ошибка при создании файла. Пожалуйста, попробуйте еще раз.");
        }
    }
}

// Очистка при закрытии
window.addEventListener('beforeunload', function() {
    recognitions.forEach((recognition) => {
        if (recognition) {
            recognition.stop();
        }
    });
});

// Загружаем данные из hash при загрузке страницы
loadFromHash();
</script>
